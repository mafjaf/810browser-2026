<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg0: #0f0f0f; --bg1: #141414; --bg2: #1c1c1c; --bg3: #242424;
    --border: #222; --border2: #2e2e2e;
    --text: #aaaaaa; --text-hi: #cccccc; --text-dim: #444444;
    --red: #aa4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg0); color: var(--text);
    font-family: 'Courier New', monospace;
    display: flex; flex-direction: column; height: 100vh;
  }

  .header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg1); display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .header svg { width: 15px; height: 15px; fill: none; stroke: #555; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .header h1 { font-size: 11px; letter-spacing: 3px; color: var(--text-hi); }
  .header .count { font-size: 10px; color: var(--text-dim); margin-left: auto; }

  .search {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--bg0);
  }
  .search input {
    width: 100%; padding: 6px 10px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 4px; color: var(--text);
    font-family: monospace; font-size: 11px; outline: none;
  }
  .search input:focus { border-color: #3a3a3a; }

  .list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  .item {
    padding: 10px 16px; border-bottom: 1px solid #181818;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.1s; cursor: pointer;
  }
  .item:hover { background: var(--bg2); }
  .fav {
    width: 16px; height: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-dim);
  }
  .fav img { width: 16px; height: 16px; }
  .body { flex: 1; min-width: 0; }
  .ttl { font-size: 12px; color: var(--text-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .url { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .del {
    width: 24px; height: 24px; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-dim);
    transition: color 0.1s, background 0.1s;
  }
  .del:hover { color: var(--red); background: rgba(170,68,68,0.15); }
  .del svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }

  .empty {
    padding: 80px 20px; text-align: center;
    color: var(--text-dim); font-size: 12px; line-height: 2.2;
  }
  .empty small { font-size: 10px; color: #333; display: block; }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  <h1>BOOKMARKS</h1>
  <span class="count" id="count"></span>
</div>
<div class="search">
  <input id="q" placeholder="search bookmarks..." oninput="render()">
</div>
<div class="list" id="list"></div>

<script>
const { ipcRenderer } = require('electron');

function gb() {
  try { return JSON.parse(localStorage.getItem('bb') || '[]'); } catch(e) { return []; }
}

function safeHost(url) {
  try { return new URL(url).hostname; } catch(e) { return ''; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const all = gb();
  const bm = all.filter(x => !q || x.url.toLowerCase().includes(q) || (x.title||'').toLowerCase().includes(q));
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  count.textContent = `${all.length} items`;

  if (!bm.length) {
    list.innerHTML = '<div class="empty">ブックマークはありません<small>アドレスバー横の bookmark ボタンで追加</small></div>';
    return;
  }

  list.innerHTML = '';
  bm.forEach((x, i) => {
    const realIndex = all.indexOf(x);
    const host = safeHost(x.url);

    const item = document.createElement('div');
    item.className = 'item';

    // ファビコン
    const fav = document.createElement('div'); fav.className = 'fav';
    if (host) {
      const img = document.createElement('img');
      img.src = `https://www.google.com/s2/favicons?domain=${host}&sz=32`;
      img.onerror = () => { img.remove(); fav.textContent = '·'; };
      fav.appendChild(img);
    } else { fav.textContent = '·'; }

    // 本文（クリックで遷移）
    const body = document.createElement('div'); body.className = 'body';
    body.innerHTML = `<div class="ttl">${esc(x.title || x.url)}</div><div class="url">${esc(x.url)}</div>`;
    body.onclick = () => { location.href = x.url; };

    // 削除ボタン
    const del = document.createElement('div'); del.className = 'del';
    del.innerHTML = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    del.onclick = (e) => {
      e.stopPropagation();
      // IPCで親ウィンドウのlocalStorageを操作して削除
      ipcRenderer.send('delete-bookmark', realIndex);
    };

    item.append(fav, body, del);
    list.appendChild(item);
  });
}

// 親からの更新通知を受け取ってリロード
ipcRenderer.on('bookmarks-updated', () => {
  render();
});

render();
</script>
</body>
</html>
