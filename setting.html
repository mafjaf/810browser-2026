<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #0d0d0d;
    --bg-card: #141414;
    --bg-input: #1c1c1c;
    --bg-row: #111;
    --border: #242424;
    --border2: #2e2e2e;
    --text: #c0c0c0;
    --text-bright: #e0e0e0;
    --text-dim: #4a4a4a;
    --danger: #aa3333;
    --warn: #886600;
    --accent: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh; overflow-y: auto;
    display: flex; justify-content: center;
    padding: 28px 16px;
  }

  .panel {
    width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.85);
    height: fit-content;
  }

  /* ヘッダー */
  .panel-header {
    background: #0a0a0a; padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .panel-header svg { width: 16px; height: 16px; fill: none; stroke: var(--accent); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .panel-header h1 { font-size: 12px; letter-spacing: 3px; color: var(--text-bright); }
  .panel-header .ver { font-size: 9px; color: var(--text-dim); margin-left: auto; letter-spacing: 1px; }

  /* セクション */
  .section { padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-label {
    font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
    margin-bottom: 14px; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* パスワード入力 */
  .pw-input {
    width: 100%; padding: 9px 12px;
    background: var(--bg-input); border: 1px solid var(--border2);
    border-radius: 5px; color: var(--text-bright);
    font-family: monospace; font-size: 14px; outline: none;
    letter-spacing: 3px; margin-bottom: 6px;
    transition: border-color 0.2s;
  }
  .pw-input:focus { border-color: var(--accent); }
  .input-hint { font-size: 9px; color: var(--text-dim); padding-left: 2px; }

  /* トグルスイッチ */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid #191919;
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 12px; color: var(--text); }
  .toggle-desc { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .sw { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
  .sw input { opacity: 0; width: 0; height: 0; }
  .sw-slider {
    position: absolute; inset: 0;
    background: #1e1e1e; border: 1px solid var(--border2);
    border-radius: 20px; cursor: pointer; transition: background 0.2s;
  }
  .sw-slider::before {
    content: ''; position: absolute;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--text-dim); left: 2px; top: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  input:checked + .sw-slider { background: #2a2a2a; border-color: var(--accent); }
  input:checked + .sw-slider::before { transform: translateX(18px); background: var(--text-bright); }

  /* ボタン */
  .btn {
    width: 100%; padding: 10px; border-radius: 5px;
    font-family: 'Courier New'; font-size: 11px; font-weight: bold;
    letter-spacing: 1.5px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    margin-bottom: 8px;
  }
  .btn:last-child { margin-bottom: 0; }
  .btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-save { background: var(--bg-input); color: var(--text-bright); border: 1px solid var(--border2); }
  .btn-save:hover { background: #282828; border-color: var(--accent); }
  .btn-restart { background: transparent; color: var(--warn); border: 1px solid #3a2e00; }
  .btn-restart:hover { background: rgba(136,102,0,0.08); border-color: var(--warn); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid #2a1010; }
  .btn-danger:hover { background: rgba(170,51,51,0.08); border-color: var(--danger); }

  /* 履歴リスト */
  .history-search {
    width: 100%; padding: 7px 10px; margin-bottom: 10px;
    background: var(--bg-input); border: 1px solid var(--border2);
    border-radius: 4px; color: var(--text);
    font-family: monospace; font-size: 11px; outline: none;
  }
  .history-search:focus { border-color: var(--accent); }

  #history-list {
    max-height: 260px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 4px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  .h-item {
    padding: 7px 10px; border-bottom: 1px solid #181818;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; transition: background 0.1s;
    font-size: 11px;
  }
  .h-item:last-child { border-bottom: none; }
  .h-item:hover { background: #1a1a1a; }
  .h-fav { width: 14px; height: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-dim); }
  .h-fav img { width: 14px; height: 14px; }
  .h-body { flex: 1; min-width: 0; }
  .h-title { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-url { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .h-time { font-size: 9px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }
  .h-del {
    width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-dim); transition: color 0.1s, background 0.1s;
  }
  .h-del:hover { color: var(--danger); background: rgba(170,51,51,0.15); }
  .h-del svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }
  .h-empty { padding: 24px; text-align: center; color: var(--text-dim); font-size: 11px; }

  .history-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
  .h-clear-btn {
    font-size: 9px; letter-spacing: 1px; padding: 4px 10px;
    background: transparent; border: 1px solid #2a1010;
    border-radius: 3px; color: var(--danger); cursor: pointer;
    font-family: monospace; transition: all 0.15s;
  }
  .h-clear-btn:hover { background: rgba(170,51,51,0.08); }

  /* ステータスバー */
  #status-bar {
    height: 26px; background: #0a0a0a; border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 22px;
    font-size: 10px; letter-spacing: 1px; color: var(--text-dim);
    transition: color 0.3s;
  }
</style>
</head>
<body>
<div class="panel">

  <!-- ヘッダー -->
  <div class="panel-header">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <h1>SETTINGS</h1>
    <span class="ver">810browser v1.0.1</span>
  </div>

  <!-- セキュリティ -->
  <div class="section">
    <div class="section-label">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Security
    </div>
    <input type="password" class="pw-input" id="new-pass" placeholder="新しいパスワードを入力...">
    <div class="input-hint">空欄のままにすると変更されません</div>
  </div>

  <!-- インターフェース -->
  <div class="section">
    <div class="section-label">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Interface
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">垂直タブ</div>
        <div class="toggle-desc">タブをサイドバーに縦並びで表示</div>
      </div>
      <label class="sw"><input type="checkbox" id="vtab-config" onchange="save()"><span class="sw-slider"></span></label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">緊急終了 <span style="font-size:9px;color:var(--warn)">[Shift+Space]</span></div>
        <div class="toggle-desc">ショートカットで即時終了</div>
      </div>
      <label class="sw"><input type="checkbox" id="kill-config" onchange="save()"><span class="sw-slider"></span></label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">AdBlock</div>
        <div class="toggle-desc">広告・トラッカーをブロック</div>
      </div>
      <label class="sw"><input type="checkbox" id="adblock-config" onchange="save()"><span class="sw-slider"></span></label>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="section">
    <div class="section-label">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      History
    </div>
    <input type="text" class="history-search" id="history-search" placeholder="search history..." oninput="renderHistory()">
    <div id="history-list"><div class="h-empty">読み込み中...</div></div>
    <div class="history-footer">
      <button class="h-clear-btn" onclick="clearHistory()">✕ 全履歴を削除</button>
    </div>
  </div>

  <!-- アクション -->
  <div class="section">
    <div class="section-label">
      <svg viewBox="0 0 24 24"><polyline points="13 2 13 9 20 9"/><path d="M20 14v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7l7 7z" style="display:none"/><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Actions
    </div>
    <button class="btn btn-save" onclick="save()">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      SAVE SETTINGS
    </button>
    <button class="btn btn-restart" onclick="restart()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      設定を反映して再起動
    </button>
    <button class="btn btn-danger" onclick="clearData()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      ブックマークを全削除
    </button>
  </div>

  <div id="status-bar">// 810browser settings</div>
</div>

<script>
const { ipcRenderer } = require('electron');

// ---- ステータス ----
function setStatus(msg, col) {
  const b = document.getElementById('status-bar');
  b.textContent = msg;
  b.style.color = col || 'var(--text-dim)';
  if (col) setTimeout(() => { b.textContent = '// 810browser settings'; b.style.color = ''; }, 3000);
}

// ---- 設定保存 ----
async function save() {
  const cfg = await ipcRenderer.invoke('get-settings');
  const newPass = document.getElementById('new-pass').value;
  const updated = {
    ...cfg,
    vtabEnabled: document.getElementById('vtab-config').checked,
    killEnabled: document.getElementById('kill-config').checked,
    adblockEnabled: document.getElementById('adblock-config').checked
  };
  if (newPass) updated.password = newPass;
  ipcRenderer.send('save-settings', updated);
  document.getElementById('new-pass').value = '';
  setStatus('✓ 保存しました', 'var(--text-bright)');
}

// ---- 再起動 ----
function restart() {
  save();
  setStatus('⟳ 再起動しています...', 'var(--warn)');
  setTimeout(() => ipcRenderer.send('restart-app'), 800);
}

// ---- ブックマーク全削除 ----
function clearData() {
  if (!confirm('ブックマークを全て削除しますか？\nこの操作は元に戻せません。')) return;
  ipcRenderer.send('clear-browser-data');
  setStatus('✓ 削除しました', 'var(--text-bright)');
}

// ---- 履歴 ----
function gh() { try { return JSON.parse(localStorage.getItem('bh') || '[]'); } catch(e) { return []; } }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function safeHost(u) { try { return new URL(u).hostname; } catch(e) { return ''; } }

function renderHistory() {
  const q = (document.getElementById('history-search').value || '').toLowerCase();
  const h = gh().filter(x => !q || x.url.toLowerCase().includes(q) || (x.title||'').toLowerCase().includes(q));
  const el = document.getElementById('history-list');
  if (!h.length) { el.innerHTML = '<div class="h-empty">履歴はありません</div>'; return; }
  el.innerHTML = h.map((x, i) => {
    const d = new Date(x.t);
    const ts = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const host = safeHost(x.url);
    const fav = host
      ? `<img src="https://www.google.com/s2/favicons?domain=${host}" onerror="this.parentNode.innerText='·'">`
      : '·';
    return `<div class="h-item">
      <div class="h-fav">${fav}</div>
      <div class="h-body" onclick="navigate('${esc(x.url)}')">
        <div class="h-title">${esc(x.title || x.url)}</div>
        <div class="h-url">${esc(x.url)}</div>
      </div>
      <div class="h-time">${ts}</div>
      <div class="h-del" onclick="delHistory(${i})" title="削除">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>`;
  }).join('');
}

function delHistory(i) {
  let h = gh(); h.splice(i, 1);
  localStorage.setItem('bh', JSON.stringify(h));
  renderHistory();
}

function clearHistory() {
  if (!confirm('履歴を全て削除しますか？')) return;
  localStorage.removeItem('bh');
  renderHistory();
  setStatus('✓ 履歴を削除しました', 'var(--text-bright)');
}

function navigate(url) {
  // 設定タブから別のタブに遷移させるためにIPCで通知
  ipcRenderer.send('navigate-url', url);
}

// ---- 初期化 ----
window.onload = async () => {
  const cfg = await ipcRenderer.invoke('get-settings');
  document.getElementById('vtab-config').checked = !!cfg.vtabEnabled;
  document.getElementById('kill-config').checked = !!cfg.killEnabled;
  document.getElementById('adblock-config').checked = !!cfg.adblockEnabled;
  renderHistory();
};
</script>
</body>
</html>
